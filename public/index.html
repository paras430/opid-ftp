<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTP Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
                <h1>FTP Portal</h1>
            </div>
            
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div id="user-profile" class="hidden" style="position: relative; display: flex; align-items: center;">
                    <div id="display-username" style="font-weight: 600; cursor: pointer; padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; display: flex; align-items: center; gap: 0.5rem; background: var(--bg-color);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <span id="username-text">Username</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <button id="btn-logout" class="action-btn btn-danger-outline hidden" style="position: absolute; top: 100%; right: 0; margin-top: 0.5rem; background: var(--bg-color); z-index: 10; width: 100%;">Logout</button>
                </div>

                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                    <svg id="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
            </div>
        </header>

        <!-- Login Screen -->
        <div id="login-screen" class="hidden" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
            <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 2rem;">
                <h2 style="text-align: center; margin-bottom: 1.5rem;">Login</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="primary-btn" style="width: 100%;">Login</button>
                    <div id="login-status" class="status-msg" style="text-align: center; margin-top: 1rem;"></div>
                </form>
            </div>
        </div>

        <main id="app-main" class="hidden">
            <section class="upload-section glass-panel">
                <h2>Upload File</h2>
                <form id="upload-form">
                    <div class="form-group">
                        <label for="file-input">Select File (Max 100MB)</label>
                        <input type="file" id="file-input" name="file" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label>Select Folder</label>
                        <div class="folder-radio-group">
                            <label class="folder-radio"><input type="radio" name="folder" value="Contract/PAT docs"><span>Contract/PAT docs</span></label>
                            <label class="folder-radio"><input type="radio" name="folder" value="Network" checked><span>Network</span></label>
                            <label class="folder-radio"><input type="radio" name="folder" value="Equipment"><span>Equipment</span></label>
                            <label class="folder-radio"><input type="radio" name="folder" value="Letter/MOM/Report"><span>Letter/MOM/Report</span></label>
                            <label class="folder-radio"><input type="radio" name="folder" value="Images"><span>Images</span></label>
                            <label class="folder-radio"><input type="radio" name="folder" value="Misc"><span>Misc</span></label>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="year">Year</label>
                            <input type="text" id="year" name="year" placeholder="e.g. 2024 (4 digits, optional)" maxlength="4" inputmode="numeric" pattern="[0-9]*">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="remarks">Remarks</label>
                        <textarea id="remarks" name="remarks" placeholder="Add any comments here... (Optional)" rows="2"></textarea>
                    </div>
                    <button type="submit" id="upload-btn" class="primary-btn">
                        <span>Upload File</span>
                        <div class="loader" id="upload-loader" style="display:none;"></div>
                    </button>
                    <div id="upload-status" class="status-msg"></div>
                </form>
            </section>

            <section class="files-section">
                <!-- Dashboard Grid -->
                <div class="dashboard-grid" id="dashboard-grid">
                    <!-- Cards will be populated dynamically -->
                </div>

                <!-- Table Section -->
                <div class="glass-panel mt-2" id="table-panel">
                    <div class="files-header">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <button id="btn-back" class="action-btn btn-primary-outline hidden" style="padding: 0.75rem 1.5rem; font-size: 1rem; border-width: 2px; font-weight: 600; border-radius: 8px;">
                                &larr; Back to Folders
                            </button>
                            <h2 id="table-title" style="margin-bottom: 0;">All Files</h2>
                        </div>
                        <div class="search-box">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input type="text" id="search-input" placeholder="Search files globally...">
                        </div>
                    </div>

                    <div class="bulk-actions" id="bulk-actions" style="margin-bottom: 1rem; display: flex; gap: 0.5rem;">
                        <button id="btn-bulk-edit" class="action-btn btn-primary-outline" disabled>Edit Selected</button>
                        <button id="btn-bulk-save" class="action-btn btn-success-outline hidden">Save Changes</button>
                        <button id="btn-bulk-delete" class="action-btn btn-danger-outline" disabled>Delete Selected</button>
                    </div>

                    <div class="table-container">
                        <table id="files-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="select-all"></th>
                                    <th>S.N.</th>
                                    <th>Name / Format</th>
                                    <th id="col-folder">Folder</th>
                                    <th>Upload Date</th>
                                    <th>Year</th>
                                    <th>Remarks</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="files-body">
                                <tr>
                                    <td colspan="7" class="empty-state">Loading files...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="pagination-container" style="text-align: center; margin-top: 1rem; margin-bottom: 1rem;">
                        <button id="btn-load-more" class="action-btn btn-primary-outline hidden" style="padding: 0.75rem 2rem; font-weight: 600;">Load More Files</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Template for folder edit dropdown (used by JS) -->
    <template id="folder-dropdown-template">
        <select class="edit-input hidden edit-folder">
            <option value="Contract/PAT docs">Contract/PAT docs</option>
            <option value="Network">Network</option>
            <option value="Equipment">Equipment</option>
            <option value="Letter/MOM/Report">Letter/MOM/Report</option>
            <option value="Images">Images</option>
            <option value="Misc">Misc</option>
        </select>
    </template>

    <script src="app.js"></script>
</body>
</html>
