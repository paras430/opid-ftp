<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTP Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
                <h1>FTP Portal</h1>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                <svg id="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </header>

        <main>
            <section class="upload-section glass-panel">
                <h2>Upload File</h2>
                <form id="upload-form">
                    <div class="form-group">
                        <label for="file-input">Select File (Max 50MB)</label>
                        <input type="file" id="file-input" name="file" required>
                    </div>
                    <div class="form-group">
                        <label for="folder">Select Folder</label>
                        <select id="folder" name="folder" required>
                            <option value="Contract/PAT docs">Contract/PAT docs</option>
                            <option value="Network">Network</option>
                            <option value="Equipment">Equipment</option>
                            <option value="Letter/MOMs/Reports">Letter/MOMs/Reports</option>
                            <option value="Images">Images</option>
                            <option value="Misc" selected>Misc</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="project-id">Project ID</label>
                            <input type="text" id="project-id" name="projectId" placeholder="e.g. PRJ-101" required>
                        </div>
                        <div class="form-group">
                            <label for="year">Year</label>
                            <input type="number" id="year" name="year" placeholder="e.g. 2024" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="remarks">Remarks</label>
                        <textarea id="remarks" name="remarks" placeholder="Add any comments here..." rows="2"></textarea>
                    </div>
                    <button type="submit" id="upload-btn" class="primary-btn">
                        <span>Upload File</span>
                        <div class="loader" id="upload-loader" style="display:none;"></div>
                    </button>
                    <div id="upload-status" class="status-msg"></div>
                </form>
            </section>

            <section class="files-section">
                <!-- Dashboard Grid -->
                <div class="dashboard-grid" id="dashboard-grid">
                    <!-- Cards will be populated dynamically -->
                </div>

                <!-- Table Section -->
                <div class="glass-panel mt-2" id="table-panel">
                    <div class="files-header">
                        <h2 id="table-title">All Files</h2>
                        <div class="search-box">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input type="text" id="search-input" placeholder="Search files globally...">
                        </div>
                    </div>

                    <div class="table-container">
                        <table id="files-table">
                            <thead>
                                <tr>
                                    <th>Name / Format</th>
                                    <th id="col-folder">Folder</th>
                                    <th>Upload Date</th>
                                    <th>Project ID</th>
                                    <th>Year</th>
                                    <th>Remarks</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="files-body">
                                <tr>
                                    <td colspan="7" class="empty-state">Loading files...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Template for folder edit dropdown (used by JS) -->
    <template id="folder-dropdown-template">
        <select class="edit-input hidden edit-folder">
            <option value="Contract/PAT docs">Contract/PAT docs</option>
            <option value="Network">Network</option>
            <option value="Equipment">Equipment</option>
            <option value="Letter/MOMs/Reports">Letter/MOMs/Reports</option>
            <option value="Images">Images</option>
            <option value="Misc">Misc</option>
        </select>
    </template>

    <script src="app.js"></script>
</body>
</html>
